<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>LeadClinic</title>
<style>
html,body{margin:0;padding:0;-webkit-text-size-adjust:100%}
*,*:before,*:after{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,sans-serif;font-size:14px;line-height:1.5;background:#F4F3EF;color:#111;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;-webkit-appearance:none;appearance:none;border:none;background:none;padding:0}
input,select,textarea{font-family:inherit;-webkit-appearance:none;appearance:none}
:root{
  --bg:#F4F3EF;--w:#fff;--s2:#F8F7F4;--b1:rgba(0,0,0,.07);--b2:rgba(0,0,0,.13);
  --t1:#111110;--t2:#6B6A65;--t3:#A09F9A;
  --r:#C1170D;--rbg:#FEF0EF;--rbd:#F5C4C0;
  --a:#9A5A08;--abg:#FDF3E3;--abd:#F5D49A;
  --g:#0A6640;--gbg:#E8F7EF;--gbd:#94D4B4;
  --bl:#1050A0;--blbg:#EAF0FB;--blbd:#9AB8EC;
  --p:#5A3FC0;--pbg:#F0EDFC;--pbd:#C0B0F0;
  --gr:#4A4A46;--grbg:#F1EFE9;--grbd:#C4C2BB;
  --co:#A83010;--cobg:#FDF0EB;--cobd:#F0B89A;
  --tl:#0A6B6B;--tlbg:#E6F7F7;--tlbd:#88CCCC;
  --sw:240px;
}
.app{display:flex;min-height:100vh;min-height:-webkit-fill-available}
.sidebar{width:var(--sw);flex-shrink:0;background:var(--w);border-right:1px solid var(--b1);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;height:-webkit-fill-available;overflow-y:auto;-webkit-overflow-scrolling:touch;z-index:200;transition:left .25s}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
.overlay.on{display:block}
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh;min-width:0}
.topbar{background:var(--w);border-bottom:1px solid var(--b1);padding:11px 20px;display:flex;align-items:center;position:sticky;top:0;z-index:100;gap:10px}
.tbl{flex:1;min-width:0}
.tb-t{font-size:15px;font-weight:700;color:var(--t1);margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-s{font-size:11px;color:var(--t3);margin:0}
.tb-r{display:flex;gap:7px;flex-shrink:0;align-items:center}
.menu-btn{display:none;padding:7px 9px;border:1px solid var(--b2);border-radius:7px;color:var(--t2)}
.srch-wrap{padding:10px 20px;background:var(--w);border-bottom:1px solid var(--b1)}
.srch-inner{position:relative}
.srch-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--t3)}
.srch-in{width:100%;padding:8px 34px;border:1px solid var(--b2);border-radius:8px;font-size:13px;color:var(--t1);background:var(--bg);outline:none}
.srch-in:focus{border-color:var(--bl);background:var(--w)}
.srch-x{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--t3);cursor:pointer;display:none;background:none;border:none;line-height:1;padding:2px 4px}
.content{padding:16px 20px;flex:1;overflow-x:hidden}
/* SIDEBAR */
.logo-area{padding:15px 15px 12px;border-bottom:1px solid var(--b1)}
.logo-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.logo-icon{width:26px;height:26px;background:var(--t1);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-name{font-size:15px;font-weight:700;color:var(--t1)}
.logo-tag{font-size:10px;color:var(--t3);letter-spacing:.6px;text-transform:uppercase;padding-left:34px}
.nav-sec{padding:10px 10px 2px}
.nav-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;padding:4px 8px 3px;font-weight:700}
.nb{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;font-size:13px;color:var(--t2);transition:background .12s,color .12s;margin-bottom:1px;width:100%;text-align:left;-webkit-tap-highlight-color:transparent}
.nb:hover{background:var(--bg);color:var(--t1)}
.nb.on{background:var(--t1);color:#fff}
.nb.on .nc{background:rgba(255,255,255,.2);color:#fff}
.ni{width:15px;height:15px;flex-shrink:0;opacity:.6}
.nb.on .ni{opacity:1}
.nc{margin-left:auto;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--bg);color:var(--t2);min-width:22px;text-align:center}
.nurg .nc{background:var(--rbg);color:var(--r)}
.sbf{margin-top:auto;padding:13px;border-top:1px solid var(--b1)}
.sbf-t{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:9px;font-weight:700}
.sbf-r{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.sbf-k{font-size:12px;color:var(--t2)}
.sbf-v{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
/* BUTTONS */
.btn{display:inline-block;padding:7px 13px;border-radius:7px;border:1px solid var(--b2);background:var(--w);font-size:12px;font-weight:600;color:var(--t1);transition:background .12s;white-space:nowrap;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn:hover{background:var(--bg)}
.btn-dark{background:var(--t1);color:#fff;border-color:var(--t1)}
.btn-dark:hover{opacity:.88;background:var(--t1)}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.kpi{background:var(--w);border:1px solid var(--b1);border-radius:10px;padding:14px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.kpi:hover{border-color:var(--b2);transform:translateY(-1px);box-shadow:0 3px 12px rgba(0,0,0,.09)}
.kpi:active{transform:none}
.kpi-arr{position:absolute;bottom:9px;right:10px;font-size:11px;color:var(--t3);opacity:0;transition:opacity .15s}
.kpi:hover .kpi-arr{opacity:1}
.kpi-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:9px}
.kpi-val{font-size:26px;font-weight:700;line-height:1;letter-spacing:-1px;margin-bottom:3px;font-variant-numeric:tabular-nums}
.kpi-lbl{font-size:11px;color:var(--t2);font-weight:600}
.kpi-sub{font-size:10px;color:var(--t3);margin-top:2px}
.kr .kpi-ico{background:var(--rbg)}.kr .kpi-val{color:var(--r)}
.ka .kpi-ico{background:var(--abg)}.ka .kpi-val{color:var(--a)}
.kg .kpi-ico{background:var(--gbg)}.kg .kpi-val{color:var(--g)}
.kbl .kpi-ico{background:var(--blbg)}.kbl .kpi-val{color:var(--bl)}
.ktl .kpi-ico{background:var(--tlbg)}.ktl .kpi-val{color:var(--tl)}
/* BANNER */
.banner{border-radius:9px;padding:10px 14px;margin-bottom:13px;font-size:12px;display:flex;align-items:flex-start;gap:9px;line-height:1.55}
.banner b{font-weight:700}
.ban-r{background:var(--rbg);border:1px solid var(--rbd);color:var(--r)}
.ban-g{background:var(--gbg);border:1px solid var(--gbd);color:var(--g)}
.ban-a{background:var(--abg);border:1px solid var(--abd);color:var(--a)}
.ban-bl{background:var(--blbg);border:1px solid var(--blbd);color:var(--bl)}
/* SECTION HEADER */
.sh{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.sh-t{font-size:13px;font-weight:700;color:var(--t1)}
.sh-m{font-size:11px;color:var(--t3)}
.sh-lnk{font-size:11px;color:var(--bl);font-weight:600;cursor:pointer}
/* TABLE */
.table-wrap{background:var(--w);border:1px solid var(--b1);border-radius:10px;overflow:hidden;margin-bottom:16px}
.tr{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .1s;-webkit-tap-highlight-color:transparent;position:relative}
.tr:last-child{border-bottom:none}
.tr:hover,.tr:focus{background:var(--bg);outline:none}
.tr:active{background:var(--s2)}
.tr-done{opacity:.5}
.tr-done::after{content:"Gestionada";position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;color:var(--g);background:var(--gbg);padding:2px 8px;border-radius:20px}
.tri{flex:1;min-width:0}
.tri-n{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tri-m{font-size:11px;color:var(--t3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tri-b{display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0;max-width:260px}
.trs{text-align:right;flex-shrink:0;min-width:46px}
.trs-v{font-size:19px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.trs-l{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
/* RANK BUBBLE */
.rb{width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;font-variant-numeric:tabular-nums}
.rb1{background:var(--abg);color:var(--a)}.rb2{background:var(--grbg);color:var(--gr)}.rb3{background:var(--cobg);color:var(--co)}.rbn{background:var(--bg);color:var(--t3)}
/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;line-height:1.6}
.br{background:var(--rbg);color:var(--r)}.ba{background:var(--abg);color:var(--a)}.bg{background:var(--gbg);color:var(--g)}
.bbl{background:var(--blbg);color:var(--bl)}.bp{background:var(--pbg);color:var(--p)}.bgr{background:var(--grbg);color:var(--gr)}.bco{background:var(--cobg);color:var(--co)}
/* SCORE BAR */
.sbar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sbar-t{flex:1;height:4px;background:var(--b2);border-radius:2px;overflow:hidden}
.sbar-f{height:4px;border-radius:2px}
/* CARDS */
.cgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.card{background:var(--w);border:1px solid var(--b1);border-radius:10px;padding:14px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;display:block;border-left-width:3px;-webkit-tap-highlight-color:transparent}
.card:hover{box-shadow:0 3px 14px rgba(0,0,0,.09);border-color:var(--b2)}
.calta{border-left-color:var(--r)}.cmedia{border-left-color:var(--a)}.cbaja{border-left-color:var(--grbd)}
.c-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;gap:8px}
.c-name{font-size:13px;font-weight:700;color:var(--t1);line-height:1.3}
.c-city{font-size:11px;color:var(--t3);margin-top:2px}
.c-sc{text-align:center;border-radius:8px;padding:5px 9px;flex-shrink:0}
.c-scn{font-size:21px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.c-scl{font-size:9px;opacity:.7;text-transform:uppercase;letter-spacing:.4px;margin-top:1px}
.c-bdg{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:9px}
.c-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;border-top:1px solid var(--b1);padding-top:9px}
.csv{font-size:12px;font-weight:700;color:var(--t1);text-align:center;font-variant-numeric:tabular-nums}
.csl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;text-align:center;margin-top:1px}
.c-foot{margin-top:9px;border-top:1px solid var(--b1);padding-top:8px;display:flex;justify-content:space-between;align-items:flex-end;gap:6px}
/* FILTER BAR */
.fbar{background:var(--w);border:1px solid var(--b1);border-radius:9px;padding:9px 12px;margin-bottom:13px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.fl{font-size:11px;color:var(--t2);font-weight:700;white-space:nowrap}
.fsep{width:1px;height:16px;background:var(--b2);margin:0 2px;flex-shrink:0}
.chip{display:inline-block;padding:4px 10px;border-radius:20px;border:1px solid var(--b2);font-size:11px;font-weight:600;cursor:pointer;color:var(--t2);transition:all .1s;background:transparent;-webkit-tap-highlight-color:transparent}
.chip:hover{border-color:var(--t1);color:var(--t1)}
.chip.on{background:var(--t1);color:#fff;border-color:var(--t1)}
/* CHARTS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.cbox{background:var(--w);border:1px solid var(--b1);border-radius:10px;padding:13px}
.cchart{display:flex;flex-direction:column;gap:8px}
.ccrow{display:flex;align-items:center;gap:8px}
.cclbl{font-size:11px;font-weight:600;color:var(--t1);min-width:80px}
.cctrack{flex:1;height:18px;background:var(--bg);border-radius:4px;overflow:hidden}
.ccbar{height:18px;border-radius:4px;display:flex;align-items:center;padding-left:7px;min-width:20px}
.ccn{font-size:11px;color:var(--t3);min-width:28px;text-align:right}
/* PAGINATION */
.pag{display:flex;gap:6px;align-items:center;justify-content:center;padding:12px 0}
.pgb{padding:6px 13px;border-radius:7px;border:1px solid var(--b2);background:var(--w);font-size:12px;font-weight:600;color:var(--t2);cursor:pointer}
.pgb:hover:not(:disabled){background:var(--bg)}
.pgb:disabled{opacity:.3;cursor:default}
.pgi{font-size:11px;color:var(--t3);margin:0 5px}
/* DETAIL */
.dh{background:var(--w);border:1px solid var(--b1);border-radius:10px;padding:16px;margin-bottom:11px}
.dh-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:11px}
.dh-name{font-size:17px;font-weight:700;color:var(--t1);line-height:1.25;letter-spacing:-.3px}
.dh-city{font-size:13px;color:var(--t2);margin-top:3px}
.dh-bdg{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px}
.dh-sc{text-align:center;background:var(--bg);border-radius:9px;padding:10px 15px;flex-shrink:0}
.dh-scn{font-size:32px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.dh-scl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.dh-cta{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}
.cta{display:inline-flex;align-items:center;gap:5px;padding:8px 13px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .1s;text-decoration:none;border:1px solid;font-family:inherit}
.cta:hover{opacity:.82}
.cta-tel{background:var(--gbg);color:var(--g);border-color:var(--gbd)}
.cta-web{background:var(--blbg);color:var(--bl);border-color:var(--blbd)}
.cta-ig{background:var(--pbg);color:var(--p);border-color:var(--pbd)}
.cta-wa{background:#E8F7EF;color:#128C7E;border-color:#94D4B4}
.cta-gg{background:var(--s2);color:var(--t2);border-color:var(--b2)}
.d2col{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.dblk{background:var(--w);border:1px solid var(--b1);border-radius:10px;padding:15px;margin-bottom:11px}
.dblk-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:10px}
.irow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px;border-bottom:1px solid var(--b1)}
.irow:last-child{border-bottom:none}
.ik{color:var(--t2);font-size:12px}
.iv{font-weight:600;color:var(--t1);text-align:right;max-width:58%}
.pitch{background:var(--gbg);border:1px solid var(--gbd);border-radius:8px;padding:13px}
.pitch-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--g);margin-bottom:7px}
.pitch-t{font-size:13px;color:var(--t1);line-height:1.65}
.prob{background:var(--rbg);border:1px solid var(--rbd);border-radius:8px;padding:13px;margin-bottom:9px}
.prob-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--r);margin-bottom:7px}
/* CRM */
.crm-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.sbtn{padding:6px 12px;border-radius:7px;border:1px solid var(--b2);background:var(--w);font-size:11px;font-weight:700;cursor:pointer;transition:all .12s;font-family:inherit}
.s-contactada{background:var(--gbg);color:var(--g);border-color:var(--gbd)}
.s-interesada{background:var(--blbg);color:var(--bl);border-color:var(--blbd)}
.s-descartada{background:var(--grbg);color:var(--gr);border-color:var(--grbd)}
.s-cerrada{background:var(--pbg);color:var(--p);border-color:var(--pbd)}
.sbtn.act{box-shadow:0 0 0 2px currentColor}
.nta{width:100%;min-height:72px;padding:9px;border:1px solid var(--b2);border-radius:7px;font-size:13px;color:var(--t1);background:var(--bg);resize:vertical;outline:none;font-family:inherit;line-height:1.5}
.nta:focus{border-color:var(--bl);background:var(--w)}
/* PROGRESS */
.prow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.prow:last-child{margin-bottom:0}
.plbl{font-size:11px;font-weight:600;color:var(--t2);min-width:100px}
.ptrack{flex:1;height:7px;background:var(--bg);border-radius:4px;overflow:hidden}
.pfill{height:7px;border-radius:4px}
.pn{font-size:11px;font-weight:700;min-width:42px;text-align:right;font-variant-numeric:tabular-nums}
/* COMPARE */
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.cmp-win{border-color:var(--g) !important;border-width:2px !important}
.cmp-win-v{color:var(--g)}.cmp-lose-v{color:var(--r)}
.cmp-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid var(--b1)}
.cmp-row:last-child{border-bottom:none}
.cmp-k{color:var(--t2)}.cmp-v{font-weight:700;min-width:70px;text-align:right}
.cmp-drop{max-height:220px;overflow-y:auto;border:1px solid var(--b2);border-radius:8px;background:var(--w);margin-top:4px;display:none;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.cmp-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--b1)}
.cmp-item:last-child{border-bottom:none}
.cmp-item:hover{background:var(--bg)}
.cmp-item-n{font-size:13px;font-weight:600;color:var(--t1)}
.cmp-item-m{font-size:11px;color:var(--t3);margin-top:2px}
.cmp-sel{display:flex;align-items:center;gap:8px;margin-top:8px;padding:8px 10px;background:var(--pbg);border:1px solid var(--pbd);border-radius:7px}
.cmp-sel span{flex:1;font-size:12px;font-weight:600;color:var(--p)}
.cmp-sel button{background:none;border:none;font-size:16px;cursor:pointer;color:var(--p);line-height:1;padding:0 2px}
/* INSIGHT BOXES */
.insight{background:var(--w);border:1px solid var(--b1);border-radius:10px;padding:14px;margin-bottom:12px}
.insight-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:10px}
.insight-row{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--b1)}
.insight-row:last-child{border-bottom:none}
.ins-rank{font-size:10px;font-weight:700;color:var(--t3);min-width:18px;font-variant-numeric:tabular-nums}
.ins-name{flex:1;font-size:12px;font-weight:600;color:var(--t1);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ins-val{font-size:12px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
/* EMPTY */
.empty-s{text-align:center;padding:40px 20px;color:var(--t3)}
/* MOBILE */
@media(max-width:768px){
  .sidebar{left:calc(-1 * var(--sw))}.sidebar.open{left:0}
  .main{margin-left:0}.menu-btn{display:flex}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}.kpi-grid .kpi:nth-child(5){grid-column:1/3}
  .cgrid{grid-template-columns:1fr}.d2col{grid-template-columns:1fr}
  .two-col{grid-template-columns:1fr}.cmp-grid{grid-template-columns:1fr}
  .tri-b{display:none}.topbar{padding:10px 14px}.content{padding:12px 14px}
  .srch-wrap{padding:10px 14px}
}

/* ── UTILS ────────────────────────────────────────────────── */
function xe(s){if(s==null)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function c2(ls){return ls>=80?'var(--r)':ls>=60?'var(--a)':ls>=40?'var(--bl)':'var(--gr)';}

function rbC(i){return i===0?'rb1':i===1?'rb2':i===2?'rb3':'rbn';}
function priC(p){return p==='Alta prioridad'?'calta':p==='Media prioridad'?'cmedia':'cbaja';}

function bPri(p){
  if(p==='Alta prioridad')return '<span class="badge br">Alta prioridad</span>';
  if(p==='Media prioridad')return '<span class="badge ba">Media prioridad</span>';
  return '';
}
function bIG(m){
  if(!m.ig)return '<span class="badge br">Sin Instagram</span>';
  if(m.fol===0&&m.pos===0)return '<span class="badge ba">IG sin verificar</span>';
  if(m.fol<100)return '<span class="badge br">'+m.fol+' seguidores</span>';
  if(m.fol<300)return '<span class="badge ba">IG d&#233;bil ('+m.fol+' seg.)</span>';
  if(m.bio==='Mala')return '<span class="badge bco">Bio sin optimizar</span>';
  if(m.pos<15)return '<span class="badge ba">IG inactivo</span>';
  return '<span class="badge bg">IG activo</span>';
}
function bOpp(o){
  if(!o)return '';
  var cls={'Oportunidad muy alta':'br','Oportunidad alta':'ba','Oportunidad media':'bbl','Oportunidad baja':'bgr'};
  return '<span class="badge '+(cls[o]||'bgr')+'">'+xe(o)+'</span>';
}
function bGap(g){
  if(g==='Gap alto')return '<span class="badge br">GAP alto</span>';
  if(g==='Gap medio')return '<span class="badge ba">GAP medio</span>';
  return '<span class="badge bgr">GAP bajo</span>';
}
function bSt(s){
  var lbl={contactada:'Contactada',interesada:'Interesada',descartada:'Descartada',cerrada:'Cerrada'};
  var cls={contactada:'bg',interesada:'bbl',descartada:'bgr',cerrada:'bp'};

}

function aF(list){
  if(q)list=list.filter(function(d){return d.n.toLowerCase().indexOf(q)>-1||d.c.toLowerCase().indexOf(q)>-1||(d.tel&&d.tel.indexOf(q)>-1);});
  if(fCity!=='all')list=list.filter(function(d){return d.c===fCity;});
  if(fIg==='noig')list=list.filter(function(d){return !d.ig;});
  if(fIg==='hasig')list=list.filter(function(d){return d.ig;});
  if(fIg==='weakig')list=list.filter(function(d){return d.ig&&(d.fol<300||d.pos<20||d.bio==='Mala');});
  if(fPri!=='all')list=list.filter(function(d){return d.pri===fPri;});
  if(fGap!=='all')list=list.filter(function(d){return d.gap===fGap;});
  if(fOpp!=='all')list=list.filter(function(d){return d.or===fOpp;});
  
  if(sortBy==='ls') list.sort(function(a,b){return b.ls-a.ls;});
  else if(sortBy==='rev') list.sort(function(a,b){return b.rev-a.rev;});
  else if(sortBy==='rat') list.sort(function(a,b){return b.rat-a.rat;});
  
  return list;
}

  document.addEventListener('click',function(e){

      pg=1;var cnt=document.getElementById('cnt');
      if(vw==='top')cnt.innerHTML=rTop();else if(vw==='noig')cnt.innerHTML=rNoIG();else if(vw==='weakig')cnt.innerHTML=rWeakIG();else if(vw==='all')cnt.innerHTML=rAll();
      return;
    }

    // Table rows / cards (open detail)
    var row=up(t,'[data-id]');

      cSave(id2,crm);nav('detail',D[id2]);return;
    }

    // Pagination
    var pgBtn=up(t,'[data-np]');
    if(pgBtn){goPg(parseInt(pgBtn.getAttribute('data-np')));return;}

    // Back button
    if(t.id==='btn-back'||up(t,'#btn-back')){history.go(-1);return;}

    // Prev/next clinic in detail view
    var navDir=up(t,'[data-nav-dir]');

      var nid=parseInt(navDir.getAttribute('data-id'));
      if(!isNaN(nid)&&D[nid])nav('detail',D[nid]);

    }

    var ci=up(t,'.cmp-item');

    if(t.id==='btn-export-csv') {
      var csvRows = ["ID,Nombre,Ciudad,Telefono,Score,EstadoCRM"];
      var baseList = vw==='top'?D.filter(function(d){return d.ls>=60;}):vw==='noig'?D.filter(function(d){return !d.ig;}):vw==='weakig'?D.filter(function(d){return d.ig&&(d.fol<300||d.pos<20||d.bio==='Mala');}):D;
      aF(baseList).forEach(function(d){
        csvRows.push(d.id+',"'+d.n.replace(/"/g,'""')+'","'+d.c+'","'+(d.tel||'')+'",'+d.ls+',"'+cGet(d.id).status+'"');
      });
      var blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvRows.join('\\n')], { type: 'text/csv;charset=utf-8;' });
      var url = URL.createObjectURL(blob);
      var link = document.createElement("a"); link.setAttribute("href", url); link.setAttribute("download", "LeadClinic_Export.csv"); document.body.appendChild(link); link.click(); document.body.removeChild(link);
      return;
    }
    
    if(t.id==='btn-copy-pitch') {

      navigator.clipboard.writeText(pitchTxt).then(function(){

    // Compare run
    if(t.id==='btn-cmp-run'){runCompare();return;}

    // "Comparar desde ficha" button — pre-loads clinic A then navigates to comparator
    var cmpFrom=up(t,'[data-cmp-from]');

      cmpA=parseInt(cmpFrom.getAttribute('data-cmp-from'));
      cmpB=-1;
      nav('compare');
      return;
    }

    // Compare reset
    if(t.id==='btn-cmp-reset'){resetCompare();return;}

    // Overlay
    if(t.id==='overlay'){closeSb();return;}

    // Menu btn

    // sh-lnk
    var lnk=up(t,'.sh-lnk');
    if(lnk&&lnk.getAttribute('data-nav')){nav(lnk.getAttribute('data-nav'));return;}
  });

  // Search
  document.getElementById('si').addEventListener('input',function(){
    q=this.value.trim().toLowerCase();
    document.getElementById('sx').style.display=q?'block':'none';
    pg=1;var cnt=document.getElementById('cnt');
    if(vw==='top')cnt.innerHTML=rTop();else if(vw==='noig')cnt.innerHTML=rNoIG();else if(vw==='weakig')cnt.innerHTML=rWeakIG();else if(vw==='all')cnt.innerHTML=rAll();

  document.getElementById('sx').addEventListener('click',function(){

  });

  // Compare search inputs
  document.addEventListener('input',function(e){
    if(e.target.id==='cmp-si-A')cmpSearch('A');
    if(e.target.id==='cmp-si-B')cmpSearch('B');
    if(e.target.id==='nta'){
      var id=parseInt(e.target.getAttribute('data-id'));
      var crm=cGet(id);crm.notes=e.target.value;cSave(id,crm);
    }
  });
}

/* ── DASHBOARD ────────────────────────────────────────────── */
function rDash(){
  var noIG=D.filter(function(d){return !d.ig;}).length;
  var wIG=D.filter(function(d){return d.ig&&(d.fol<300||d.pos<20||d.bio==='Mala');}).length;
  var hi=D.filter(function(d){return d.ls>=80;}).length;
  var cont=Object.keys(CRM).filter(function(k){return CRM[k].status;}).length;

  // City analysis
  var cities={};
  D.forEach(function(d){
    if(!d.c)return;
    if(!cities[d.c])cities[d.c]={t:0,hi:0,noig:0,revSum:0};
    cities[d.c].t++;
    if(d.ls>=80)cities[d.c].hi++;
    if(!d.ig)cities[d.c].noig++;
    cities[d.c].revSum+=d.rev;
  });
  var ca=Object.entries(cities).sort(function(a,b){return b[1].hi-a[1].hi;}).slice(0,6);
  var maxHi=Math.max.apply(null,ca.map(function(x){return x[1].hi;}))||1;

  var cityH=ca.map(function(item){
    var c=item[0];var d=item[1];
    var pct=Math.max(6,Math.round(d.hi/maxHi*100));
    var avgRev=Math.round(d.revSum/d.t);
    return '<div class="ccrow"><div class="cclbl">'+xe(c)+'</div>'
      +'<div class="cctrack"><div class="ccbar" style="width:'+pct+'%;background:var(--rbg);border:1px solid var(--rbd)">'
      +'<span style="font-size:10px;font-weight:700;color:var(--r)">'+d.hi+'</span></div></div>'
      +'<div class="ccn" style="min-width:60px;font-size:10px">'+d.noig+' sin IG</div></div>';
  }).join('');

  // Opp distribution
  var oCnt={'Oportunidad muy alta':0,'Oportunidad alta':0,'Oportunidad media':0,'Oportunidad baja':0};
  D.forEach(function(d){if(oCnt[d.or]!==undefined)oCnt[d.or]++;});
  var oC={'Oportunidad muy alta':'var(--r)','Oportunidad alta':'var(--a)','Oportunidad media':'var(--bl)','Oportunidad baja':'var(--gr)'};
  var oB={'Oportunidad muy alta':'var(--rbg)','Oportunidad alta':'var(--abg)','Oportunidad media':'var(--blbg)','Oportunidad baja':'var(--grbg)'};
  var oppH=Object.keys(oCnt).map(function(k){
    var v=oCnt[k];var pct=Math.max(4,Math.round(v/D.length*100));
    return '<div class="ccrow" style="margin-bottom:7px"><div class="cclbl" style="min-width:130px;font-size:11px">'+xe(k)+'</div>'
      +'<div class="cctrack"><div class="ccbar" style="width:'+pct+'%;background:'+oB[k]+'">'
      +'<span style="font-size:10px;font-weight:700;color:'+oC[k]+'">'+v+'</span></div></div>'
      +'<div class="ccn">'+pct+'%</div></div>';
  }).join('');

  // Reviews analysis - top 5 by review count (=biggest clinics)
  var byRev=D.slice().sort(function(a,b){return b.rev-a.rev;}).slice(0,5);
  var revH=byRev.map(function(d,i){
    return '<div class="insight-row"><span class="ins-rank">'+(i+1)+'</span>'
      +'<span class="ins-name">'+xe(d.n)+'</span>'
      +'<span class="ins-val" style="color:var(--bl)">'+d.rev+' reseñas</span>'
      +'<span class="ins-val" style="color:var(--t3);margin-left:8px">'+xe(d.c)+'</span></div>';
  }).join('');

  var progPct=cont>0?Math.round(cont/D.length*100):0;
  var noigPct=Math.round(noIG/D.length*100);
  var top4=D.slice(0,4);

  return '<div class="kpi-grid">'
    +'<div class="kpi kbl" data-kpi="all"><div class="kpi-ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--bl)" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></div><div class="kpi-val">'+D.length+'</div><div class="kpi-lbl">Clínicas</div><div class="kpi-sub">base completa</div><div class="kpi-arr">→</div></div>'
    +'<div class="kpi kr" data-kpi="noig"><div class="kpi-ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--r)" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><line x1="4" y1="4" x2="20" y2="20"/></svg></div><div class="kpi-val">'+noIG+'</div><div class="kpi-lbl">Sin Instagram</div><div class="kpi-sub">captación directa</div><div class="kpi-arr">→</div></div>'
    +'<div class="kpi ka" data-kpi="weakig"><div class="kpi-ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--a)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="kpi-val">'+wIG+'</div><div class="kpi-lbl">IG mejorable</div><div class="kpi-sub">perfil sin resultados</div><div class="kpi-arr">→</div></div>'
    +'<div class="kpi kr" data-kpi="top"><div class="kpi-ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--r)" stroke-width="2" stroke-linecap="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg></div><div class="kpi-val">'+hi+'</div><div class="kpi-lbl">Score ≥80</div><div class="kpi-sub">alta rentabilidad</div><div class="kpi-arr">→</div></div>'
    +'<div class="kpi ktl" data-kpi="contacted"><div class="kpi-ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--tl)" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><div class="kpi-val">'+cont+'</div><div class="kpi-lbl">Contactadas</div><div class="kpi-sub">gestionadas</div><div class="kpi-arr">→</div></div>'
    +'</div>'

    +'<div class="dblk"><div class="dblk-t">Progreso de captación</div>'
    +'<div class="prow"><span class="plbl">Contactadas</span><div class="ptrack"><div class="pfill" style="width:'+progPct+'%;background:var(--tl)"></div></div><span class="pn" style="color:var(--tl)">'+cont+'/'+D.length+'</span></div>'
    +'<div class="prow"><span class="plbl">Sin Instagram</span><div class="ptrack"><div class="pfill" style="width:'+noigPct+'%;background:var(--r)"></div></div><span class="pn" style="color:var(--r)">'+noIG+' ('+noigPct+'%)</span></div>'
    +'</div>'

    +'<div class="banner ban-r"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div><b>'+noIG+' clínicas sin Instagram.</b> Son el target más fácil: problema evidente, argumento concreto, cierre rápido.</div></div>'
    +'<div class="banner ban-g"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg><div><b>'+hi+' clínicas con lead score ≥80.</b> Tienen volumen de pacientes y GAP competitivo alto. Ahí está el ticket.</div></div>'

    +'<div class="two-col">'
    +'<div><div class="sh"><span class="sh-t">Oportunidad por ciudad</span><span class="sh-m">leads score ≥80 + sin IG</span></div><div class="cbox"><div class="cchart">'+cityH+'</div></div></div>'
    +'<div><div class="sh"><span class="sh-t">Distribución de oportunidad</span></div><div class="cbox">'+oppH+'</div></div>'
    +'</div>'

    +'<div class="two-col">'
    +'<div><div class="sh"><span class="sh-t">Clínicas con más reseñas</span><span class="sh-m">mayor volumen = mayor ticket</span></div>'
    +'<div class="insight"><div class="insight-t">Top 5 por reseñas Google</div>'+revH+'</div></div>'
    +'<div><div class="sh"><span class="sh-t">Distribución de oportunidad</span></div><div class="cbox">'+oppH+'</div></div>'
    +'</div>'

    +'<div class="sh"><span class="sh-t">Leads más calientes — contactar hoy</span><span class="sh-lnk" data-nav="top">Ver ranking completo →</span></div>'
    +'<div class="cgrid">'+top4.map(rCard).join('')+'</div>';
}

/* ── ROW ──────────────────────────────────────────────────── */
function rRow(m,idx,compact){
  var done=cGet(m.id).status?' tr-done':'';
  var extra=compact?'':bPri(m.pri)+bIG(m)+bOpp(m.or);
  return '<div class="tr'+done+'" data-id="'+m.id+'" tabindex="0" role="button">'
    +'<div class="rb '+rbC(idx)+'">'+(idx+1)+'</div>'
    +'<div class="tri"><div class="tri-n">'+xe(m.n)+'</div>'
    +'<div class="tri-m">'+xe(m.c)+' · '+xe(m.tel||'—')+(compact?' · '+m.rev+' reseñas':'')+'</div></div>'
    +(compact?'':'<div class="tri-b">'+extra+'</div>')
    +'<div class="trs"><div class="trs-v" style="color:'+c2(m.ls)+'">'+m.ls+'</div><div class="trs-l">score</div></div>'
    +'</div>';
}
function rPaged(list){
  if(!list.length)return '<div class="empty-s"><div style="font-size:32px;margin-bottom:10px">&#128270;</div><div style="font-size:14px;font-weight:600;color:var(--t2);margin-bottom:4px">Sin resultados</div><div style="font-size:12px">Prueba con otros filtros o limpia la b&#250;squeda</div></div>';
  var start=(pg-1)*PAGE;var sl=list.slice(start,start+PAGE);var tot=Math.ceil(list.length/PAGE);
  var rows=sl.map(function(m,i){return rRow(m,start+i,false);}).join('');
  var pag=tot>1?'<div class="pag"><button class="pgb" '+(pg<=1?'disabled':'')+' data-np="'+(pg-1)+'">←</button><span class="pgi">'+pg+'/'+tot+' · '+list.length+'</span><button class="pgb" '+(pg>=tot?'disabled':'')+' data-np="'+(pg+1)+'">→</button></div>':'';
  return '<div class="table-wrap">'+rows+'</div>'+pag;
}

function rNoIG(){

      +'</div>';

  return '<div class="banner ban-r"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><line x1="4" y1="4" x2="20" y2="20"/></svg><div><b>'+base.length+' clínicas sin Instagram.</b> Argumento de venta directo: "su competencia ya capta pacientes en IG y ustedes no aparecen". El cierre es el más sencillo del portafolio.</div></div>'
    +bF(false,true,true,true)+'<div class="table-wrap">'+rows+'</div>';
}

/* ── WEAK IG ──────────────────────────────────────────────── */
function rWeakIG(){
  var base=D.filter(function(d){return d.ig&&(d.fol<300||d.pos<20||d.bio==='Mala');});
  var list=aF(base);
  var rows=list.map(function(m,i){
    var done=cGet(m.id).status?' tr-done':'';
    var iss='';
    if(m.fol===0&&m.pos===0)iss+='<span class="badge ba">Sin datos IG</span>';
    else if(m.fol<100)iss+='<span class="badge br">'+m.fol+' seg.</span>';
    else if(m.fol<300)iss+='<span class="badge ba">'+m.fol+' seg.</span>';
    if(m.pos>0&&m.pos<10)iss+='<span class="badge br">'+m.pos+' posts</span>';
    else if(m.pos>=10&&m.pos<20)iss+='<span class="badge ba">'+m.pos+' posts</span>';
    if(m.bio==='Mala')iss+='<span class="badge bco">Bio mala</span>';

      +'<div class="rb '+rbC(i)+'">'+(i+1)+'</div>'
      +'<div class="tri"><div class="tri-n">'+xe(m.n)+'</div><div class="tri-m">'+xe(m.c)+' · '+m.rev+' reseñas</div></div>'
      +'<div class="tri-b">'+iss+'</div>'
      +'<div class="trs"><div class="trs-v" style="color:'+c2(m.ls)+'">'+m.ls+'</div><div class="trs-l">score</div></div>'

  return '<div class="banner ban-a"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div><b>'+base.length+' clínicas con Instagram sin explotar.</b> Ya validan las redes — el argumento es más sencillo. Necesitan estrategia, no convencimiento.</div></div>'
    +bF(false,true,true,true)+'<div class="table-wrap">'+rows+'</div>';
}

/* ── ALL ──────────────────────────────────────────────────── */
function rAll(){

}

/* ── COMPARE ──────────────────────────────────────────────── */
function rCompare(){
  var selA=cmpA>=0?'<div class="cmp-sel"><span>'+xe(D[cmpA].n)+' — '+xe(D[cmpA].c)+' · Score: '+D[cmpA].ls+'</span><button data-clr="A">✕</button></div>':'';

  var result=cmpA>=0&&cmpB>=0?rCmpResult(D[cmpA],D[cmpB]):'';

  var bannerCls=preloaded?'ban-g':'ban-bl';

    ?'<b>Clínica A seleccionada: '+xe(D[cmpA].n)+'.</b> Ahora busca la clínica B y pulsa Comparar.'

    +(preloaded?'<path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>':'<polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/>')
    +'</svg><div>'+bannerTxt+'</div></div>'
    +'<div class="cmp-grid">'
    +'<div class="dblk"><div class="dblk-t">Clínica A</div>'
    +'<input id="cmp-si-A" class="srch-in" placeholder="Escribe nombre o ciudad..." autocomplete="off" autocorrect="off" value="">'
    +'<div id="cmp-drop-A" class="cmp-drop"></div>'+selA+'</div>'
    +'<div class="dblk"><div class="dblk-t">Clínica B</div>'
    +'<input id="cmp-si-B" class="srch-in" placeholder="Escribe nombre o ciudad..." autocomplete="off" autocorrect="off" value="">'
    +'<div id="cmp-drop-B" class="cmp-drop"></div>'+selB+'</div>'
    +'</div>'
    +'<div style="display:flex;gap:8px;justify-content:center;margin-bottom:16px">'
    +'<button id="btn-cmp-run" class="btn btn-dark" style="padding:10px 28px;font-size:13px">⇄ Comparar ahora</button>'
    +'<button id="btn-cmp-reset" class="btn" style="padding:10px 16px;font-size:13px">Limpiar</button>'

function cmpSearch(which){
  var inp=document.getElementById('cmp-si-'+which);
  var drop=document.getElementById('cmp-drop-'+which);
  if(!inp||!drop)return;
  var val=inp.value.trim().toLowerCase();
  if(!val){drop.style.display='none';drop.innerHTML='';return;}
  var matches=D.filter(function(d){return d.n.toLowerCase().indexOf(val)>-1||d.c.toLowerCase().indexOf(val)>-1;}).slice(0,10);
  if(!matches.length){drop.style.display='none';return;}
  drop.innerHTML=matches.map(function(d){
    return '<div class="cmp-item" data-which="'+which+'" data-id="'+d.id+'">'
      +'<div class="cmp-item-n">'+xe(d.n)+'</div>'
      +'<div class="cmp-item-m">'+xe(d.c)+' · Score: '+d.ls+' · '+(d.ig?fmt(d.fol)+' seg.':'Sin Instagram')+' · '+d.rev+' reseñas</div>'
      +'</div>';
  }).join('');
  drop.style.display='block';
}

function cmpPick(which,id){
  if(which==='A')cmpA=id;else cmpB=id;
  var inp=document.getElementById('cmp-si-'+which);
  var drop=document.getElementById('cmp-drop-'+which);
  if(inp)inp.value='';
  if(drop){drop.style.display='none';drop.innerHTML='';}
  document.getElementById('cnt').innerHTML=rCompare();
}

function cmpClear(which){
  if(which==='A')cmpA=-1;else cmpB=-1;
  document.getElementById('cnt').innerHTML=rCompare();
}

function runCompare(){
  var res=document.getElementById('cmp-result');if(!res)return;
  if(cmpA<0||cmpB<0){res.innerHTML='<div class="banner ban-a"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div>Selecciona las dos clínicas antes de comparar.</div></div>';return;}
  if(cmpA===cmpB){res.innerHTML='<div class="banner ban-a"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div>Selecciona dos clínicas diferentes.</div></div>';return;}
  res.innerHTML=rCmpResult(D[cmpA],D[cmpB]);
  setTimeout(function(){res.scrollIntoView({behavior:'smooth',block:'start'});},50);
}

function resetCompare(){cmpA=-1;cmpB=-1;document.getElementById('cnt').innerHTML=rCompare();}

function rCmpResult(a,b){
  function wA(va,vb){return va>vb?'cmp-win-v':va<vb?'cmp-lose-v':'';}
  function wB(va,vb){return vb>va?'cmp-win-v':vb<va?'cmp-lose-v':'';}
  var aW=0,bW=0;
  var fields=[
    {k:'Lead score',va:a.ls,vb:b.ls,fn:function(v){return v;}},
    {k:'Facilidad de venta',va:a.ease,vb:b.ease,fn:function(v){return v+'/100';}},
    {k:'Nº de reseñas',va:a.rev,vb:b.rev,fn:function(v){return v+' reseñas';},help:'Proxy de volumen de pacientes y ticket potencial'},
    {k:'Rating Google',va:a.rat,vb:b.rat,fn:function(v){return v+'★';}},
    {k:'Seguidores IG',va:a.fol,vb:b.fol,fn:function(v){return v===0&&!a.ig?'Sin IG':fmt(v);}},
    {k:'Publicaciones IG',va:a.pos,vb:b.pos,fn:function(v){return v>0?v:'Sin IG';}},
    {k:'Score marketing',va:a.score,vb:b.score,fn:function(v){return v+'/10';}}
  ];
  fields.forEach(function(f){if(f.va>f.vb)aW++;else if(f.vb>f.va)bW++;});
  // Extra indicators
  if(!a.ig&&b.ig)aW++;else if(a.ig&&!b.ig)bW++;
  if(a.gap==='Gap alto'&&b.gap!=='Gap alto')aW++;else if(b.gap==='Gap alto'&&a.gap!=='Gap alto')bW++;
  if(a.bio==='Mala'&&b.bio!=='Mala')aW++;else if(b.bio==='Mala'&&a.bio!=='Mala')bW++;
  var total=fields.length+3;
  var winner=aW>bW?a:bW>aW?b:null;

  var fRows=fields.map(function(f){
    var vaStr=f.fn(f.va);var vbStr=f.fn(f.vb);
    return '<div class="cmp-row">'
      +'<span class="cmp-k">'+f.k+(f.help?'<span style="font-size:10px;color:var(--t3);display:block">'+f.help+'</span>':'')+'</span>'
      +'<span style="display:flex;gap:24px;flex-shrink:0">'
      +'<span class="cmp-v '+wA(f.va,f.vb)+'">'+vaStr+'</span>'
      +'<span class="cmp-v '+wB(f.va,f.vb)+'">'+vbStr+'</span>'
      +'</span></div>';
  }).join('');

  var extraRows=''
    +'<div class="cmp-row"><span class="cmp-k">Tiene Instagram</span><span style="display:flex;gap:24px;flex-shrink:0"><span class="cmp-v '+(a.ig?'cmp-win-v':'cmp-lose-v')+'">'+(a.ig?'Sí':'No')+'</span><span class="cmp-v '+(b.ig?'cmp-win-v':'cmp-lose-v')+'">'+(b.ig?'Sí':'No')+'</span></span></div>'
    +'<div class="cmp-row"><span class="cmp-k">GAP competitivo</span><span style="display:flex;gap:24px;flex-shrink:0"><span class="cmp-v '+(a.gap==='Gap alto'?'cmp-win-v':a.gap==='Gap bajo'?'cmp-lose-v':'')+'">'+(a.gap||'—')+'</span><span class="cmp-v '+(b.gap==='Gap alto'?'cmp-win-v':b.gap==='Gap bajo'?'cmp-lose-v':'')+'">'+(b.gap||'—')+'</span></span></div>'
    +'<div class="cmp-row"><span class="cmp-k">Calidad bio IG</span><span style="display:flex;gap:24px;flex-shrink:0"><span class="cmp-v '+(a.bio==='Buena'?'cmp-win-v':a.bio==='Mala'?'cmp-lose-v':'')+'">'+(a.bio||'—')+'</span><span class="cmp-v '+(b.bio==='Buena'?'cmp-win-v':b.bio==='Mala'?'cmp-lose-v':'')+'">'+(b.bio||'—')+'</span></span></div>';

  var why='';
  if(winner){
    if(!winner.ig)why='Sin Instagram: el problema es visible y el argumento de venta es concreto. Cierre más rápido.';
    else if(winner.rev>(winner===a?b.rev:a.rev)*1.5)why='Con '+winner.rev+' reseñas tiene una base de pacientes consolidada. Mayor volumen = mayor ticket potencial.';
    else if(winner.gap==='Gap alto')why='GAP competitivo alto: su competencia ya trabaja las redes mientras ellos no. Urgencia real de actuar.';
    else if(winner.ease>(winner===a?b.ease:a.ease))why='Mayor facilidad de venta detectada: los factores de decisión del cliente son más favorables.';
    else why='Mejor combinación de score, reseñas y oportunidad en redes.';
  }

  var conclusion=winner
    ?'<div class="banner ban-g" style="margin-top:12px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><div><b>Contactar primero: '+xe(winner.n)+'</b> — gana en '+Math.max(aW,bW)+' de '+total+' indicadores. '+why+'</div></div>'
    :'<div class="banner ban-a"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div><b>Empate técnico.</b> Contacta primero la que tenga móvil (WhatsApp disponible) o la geográficamente más cercana.</div></div>';

  return '<div class="dblk">'
    +'<div style="display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:12px">'
    +'<div><div class="dblk-t '+(winner===a?'cmp-win-v':'')+'">Clínica A '+(winner===a?'🏆':'')+' ('+aW+' puntos)</div>'
    +'<div style="font-size:13px;font-weight:700;color:var(--t1)">'+xe(a.n)+'</div>'
    +'<div style="font-size:11px;color:var(--t3)">'+xe(a.c)+' · Score: '+a.ls+'</div></div>'
    +'<div style="font-size:20px;font-weight:700;color:var(--t3);text-align:center">vs</div>'
    +'<div style="text-align:right"><div class="dblk-t '+(winner===b?'cmp-win-v':'')+'" style="justify-content:flex-end">'+( winner===b?'🏆 ':'')+' Clínica B ('+bW+' puntos)</div>'
    +'<div style="font-size:13px;font-weight:700;color:var(--t1)">'+xe(b.n)+'</div>'
    +'<div style="font-size:11px;color:var(--t3)">'+xe(b.c)+' · Score: '+b.ls+'</div></div>'
    +'</div>'
    +fRows+extraRows+'</div>'
    +conclusion
    +'<div class="cmp-grid">'
    +'<div class="dblk'+(winner===a?' cmp-win':'')+'"><div class="dblk-t">'+(winner===a?'🏆 ':'')+xe(a.n)+'</div>'
    +'<div style="font-size:13px;margin-bottom:8px">Score: '+a.ls+' · '+a.rat+'★ · '+a.rev+' reseñas</div>'
    +'<div style="font-size:13px;margin-bottom:8px">'+(a.ig?fmt(a.fol)+' seguidores en IG':'<b style="color:var(--r)">Sin Instagram</b>')+'</div>'
    +'<div style="font-size:12px;color:var(--t2);margin-bottom:10px">'+xe(a.tel||'Sin teléfono')+(a.mobile?' 📱':' ☎')+'</div>'
    +'<button class="btn btn-dark" style="width:100%" data-id="'+a.id+'">Ver ficha completa</button></div>'
    +'<div class="dblk'+(winner===b?' cmp-win':'')+'"><div class="dblk-t">'+(winner===b?'🏆 ':'')+xe(b.n)+'</div>'
    +'<div style="font-size:13px;margin-bottom:8px">Score: '+b.ls+' · '+b.rat+'★ · '+b.rev+' reseñas</div>'
    +'<div style="font-size:13px;margin-bottom:8px">'+(b.ig?fmt(b.fol)+' seguidores en IG':'<b style="color:var(--r)">Sin Instagram</b>')+'</div>'
    +'<div style="font-size:12px;color:var(--t2);margin-bottom:10px">'+xe(b.tel||'Sin teléfono')+(b.mobile?' 📱':' ☎')+'</div>'
    +'<button class="btn btn-dark" style="width:100%" data-id="'+b.id+'">Ver ficha completa</button></div>'
    +'</div>';
}

/* ── CONTACTED ────────────────────────────────────────────── */
function rContacted(){
  var list=D.filter(function(d){return cGet(d.id).status;});
  if(!list.length)return '<div class="empty-s"><div style="font-size:36px;margin-bottom:10px">☎️</div><div style="font-size:14px;font-weight:600;color:var(--t2);margin-bottom:4px">Aún no hay clínicas contactadas</div><div style="font-size:12px">Marca el estado desde la ficha de cualquier clínica</div></div>';
  var grp={cerrada:[],interesada:[],contactada:[],descartada:[]};
  list.forEach(function(m){var s=cGet(m.id).status;if(grp[s])grp[s].push(m);});
  var lbl={cerrada:'Cerradas 🏆',interesada:'Interesadas 👍',contactada:'Contactadas',descartada:'Descartadas'};
  var h='';
  ['cerrada','interesada','contactada','descartada'].forEach(function(s){
    var g=grp[s];if(!g.length)return;
    h+='<div class="sh"><span class="sh-t">'+lbl[s]+' ('+g.length+')</span></div><div class="table-wrap">';
    g.forEach(function(m){
      var crm=cGet(m.id);
      h+='<div class="tr" data-id="'+m.id+'">'
        +'<div class="tri"><div class="tri-n">'+xe(m.n)+'</div>'
        +'<div class="tri-m">'+xe(m.c)+' · '+(crm.ts||'sin fecha')+(crm.notes?' · 📝 '+xe(crm.notes.substring(0,40)):'')+'</div></div>'
        +'<div class="trs"><div class="trs-v" style="color:'+c2(m.ls)+'">'+m.ls+'</div><div class="trs-l">score</div></div></div>';
    });
    h+='</div>';
  });
  return h;
}

/* ── PIPELINE ─────────────────────────────────────────────── */
function rPipeline(){
  var total=D.length;
  var cnt={contactada:0,interesada:0,cerrada:0,descartada:0};
  Object.keys(CRM).forEach(function(k){var s=CRM[k].status;if(cnt[s]!==undefined)cnt[s]++;});
  var sinC=total-Object.keys(CRM).filter(function(k){return CRM[k].status;}).length;
  var gest=total-sinC;
  var tasa=gest>0?Math.round(cnt.cerrada/gest*100):0;
  
  var avgTicket = 1500; 
  var pipeVal = (cnt.interesada + cnt.contactada) * avgTicket * 0.1; 
  var wonVal = cnt.cerrada * avgTicket;

  var sc2={contactada:'var(--tl)',interesada:'var(--bl)',cerrada:'var(--p)',descartada:'var(--gr)'};
  var sl={contactada:'Contactadas',interesada:'Interesadas',cerrada:'Cerradas',descartada:'Descartadas'};
  var prows='<div class="prow"><span class="plbl">Por contactar</span><div class="ptrack"><div class="pfill" style="width:'+Math.round(sinC/total*100)+'%;background:var(--grbd)"></div></div><span class="pn" style="color:var(--gr)">'+sinC+'</span></div>';
  ['contactada','interesada','cerrada','descartada'].forEach(function(s){
    var n=cnt[s];
    prows+='<div class="prow"><span class="plbl">'+sl[s]+'</span><div class="ptrack"><div class="pfill" style="width:'+Math.round(n/total*100)+'%;background:'+sc2[s]+'"></div></div><span class="pn" style="color:'+sc2[s]+'">'+n+'</span></div>';
  });
  return '<div class="kpi-grid" style="grid-template-columns:repeat(5,1fr)">'
    +'<div class="kpi kbl" style="cursor:default"><div class="kpi-ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--bl)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div class="kpi-val">'+sinC+'</div><div class="kpi-lbl">Por contactar</div></div>'
    +'<div class="kpi ktl" style="cursor:default"><div class="kpi-ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--tl)" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 01-2.18 2"/></svg></div><div class="kpi-val">'+cnt.contactada+'</div><div class="kpi-lbl">Contactadas</div></div>'
    +'<div class="kpi kg" style="cursor:default"><div class="kpi-ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--g)" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="kpi-val">'+cnt.cerrada+'</div><div class="kpi-lbl">Cerradas</div></div>'
    +'<div class="kpi ka" style="cursor:default"><div class="kpi-ico" style="background:var(--abg)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--a)" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><div class="kpi-val" style="color:var(--a); font-size:16px">€'+fmt(pipeVal)+'</div><div class="kpi-lbl">Valor Pipeline</div></div>'
    +'<div class="kpi" style="cursor:default"><div class="kpi-ico" style="background:var(--pbg)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--p)" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><div class="kpi-val" style="color:var(--p); font-size:16px">€'+fmt(wonVal)+'</div><div class="kpi-lbl">Ingreso Asegurado</div></div>'
    +'</div>'
    +'<div class="dblk"><div class="dblk-t">Embudo de ventas</div>'+prows+'</div>'
    +(cnt.interesada>0?'<div class="banner ban-bl"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div><b>'+cnt.interesada+' clínicas interesadas.</b> Son tu prioridad inmediata. Entra en Contactadas y gestíona el seguimiento.</div></div>':'')
    +'<div class="banner ban-g"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/></svg><div>Quedan <b>'+sinC+' clínicas sin contactar.</b> Cada día sin llamar es un lead que se enfría.</div></div>';
}

/* ── DETAIL ───────────────────────────────────────────────── */
function rDetail(m){
  var color=c2(m.ls);var crm=cGet(m.id);
  var bioColor=m.bio==='Buena'?'var(--g)':m.bio==='Mala'?'var(--r)':'var(--a)';
  var igBlock=m.ig
    ?'<div class="irow"><span class="ik">Seguidores</span><span class="iv">'+fmt(m.fol)+'</span></div>'
      +'<div class="irow"><span class="ik">Publicaciones</span><span class="iv">'+(m.pos||0)+'</span></div>'
      +'<div class="irow"><span class="ik">Calidad bio</span><span class="iv" style="color:'+bioColor+'">'+(m.bio||'Sin analizar')+'</span></div>'
      +'<div class="irow"><span class="ik">Oportunidad IG</span><span class="iv">'+xe(m.or||'—')+'</span></div>'
    :'<div style="padding:14px 0;text-align:center"><div style="font-size:26px;margin-bottom:5px">📵</div>'
      +'<div style="font-size:13px;font-weight:700;color:var(--r);margin-bottom:3px">Sin cuenta de Instagram</div>'
      +'<div style="font-size:12px;color:var(--t3)">Oportunidad de captación directa e inmediata</div></div>';

  var problem=m.ig
    ?'Tienen Instagram pero no genera consultas. El perfil muestra '
      +(m.fol===0&&m.pos===0?'datos no verificados':m.fol<100?'solo '+m.fol+' seguidores':m.fol<300?m.fol+' seguidores (muy por debajo del potencial local)':m.pos<20?m.pos+' publicaciones (perfil inactivo)':'actividad por debajo del potencial')
      +(m.bio==='Mala'?' y la bio no tiene llamada a la acción ni servicios':'')
      +'. Con '+m.rev+' reseñas tienen un volumen de pacientes real — están perdiendo captación.'
    :xe(m.n)+' tiene '+m.rat+' estrellas y '+m.rev+' reseñas. Esa reputación solo llega a quienes ya los buscan. Sin Instagram, son invisibles para el 60% de pacientes potenciales de 25-45 años que decide en redes antes de llamar. Su competencia en '+xe(m.c)+' ya los está captando.';

  var pitch=m.ig
    ?'"Hola, llamo de [agencia]. He revisado su perfil de Instagram — tienen '+m.fol+' seguidores y '+m.pos+' publicaciones, pero con '+m.rev+' reseñas en Google es obvio que su clínica tiene más volumen del que refleja Instagram. Clínicas similares en '+xe(m.c)+' con estrategia activa generan 3-5 consultas nuevas al mes solo desde redes. ¿Tiene 10 minutos esta semana para ver cómo lo conseguiríamos?"'
    :'"Hola, llamo de [agencia]. He analizado su clínica — tienen '+m.rev+' reseñas con '+m.rat+' estrellas en Google, que es una reputación excelente. El problema es que esa reputación es invisible en Instagram, y ahí es donde el 60% de sus pacientes potenciales busca hoy antes de llamar. Sus competidores en '+xe(m.c)+' ya están ahí. ¿Le muestro en 5 minutos lo que se está perdiendo?"';

  var waNum=m.tel?m.tel.replace(/[\s\-\+]/g,'').replace(/^34/,''):'';
  var waMsg=encodeURIComponent('Hola, le escribo de [agencia]. He analizado la presencia digital de '+m.n+' y tengo una propuesta concreta para captar más pacientes desde Instagram. ¿Tiene 10 minutos esta semana?');
  var ctas='';
  if(m.tel)ctas+='<a class="cta cta-tel" href="tel:'+xe(m.tel)+'"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8a19.79 19.79 0 01-3.07-8.67A2 2 0 012 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>Llamar</a>';
  if(m.mobile&&waNum)ctas+='<a class="cta cta-wa" href="https://wa.me/34'+waNum+'?text='+waMsg+'" target="_blank" rel="noopener"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>WhatsApp</a>';
  if(m.web&&m.web!='#')ctas+='<a class="cta cta-web" href="'+xe(m.web)+'" target="_blank" rel="noopener"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>Web</a>';
  if(m.ig&&m.igu)ctas+='<a class="cta cta-ig" href="'+xe(m.igu)+'" target="_blank" rel="noopener"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/></svg>Instagram</a>';
  ctas+='<a class="cta cta-gg" href="https://www.google.com/search?q='+encodeURIComponent(m.n+' '+m.c)+'" target="_blank" rel="noopener"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Google</a>';

  var stBtns='<div class="crm-btns">';
  var stMap={contactada:'Contactada',interesada:'Interesada',descartada:'Descartar',cerrada:'🏆 Cerrada'};
  Object.keys(stMap).forEach(function(s){
    stBtns+='<button class="sbtn s-'+s+(crm.status===s?' act':'')+'" data-st="'+s+'" data-id="'+m.id+'">'+stMap[s]+'</button>';
  });
  if(crm.status)stBtns+='<button class="sbtn" data-st="" data-id="'+m.id+'">Limpiar</button>';
  stBtns+='</div>';

  return '<div class="dh">'
    +'<div class="dh-top"><div style="flex:1;min-width:0"><div class="dh-name">'+xe(m.n)+'</div><div class="dh-city">'+xe(m.c)+' · '+xe(m.p)+'</div>'
    +'<div class="dh-bdg">'+bPri(m.pri)+bIG(m)+bOpp(m.or)+(m.gap?bGap(m.gap):'')+(crm.status?bSt(crm.status):'')+'</div></div>'
    +'<div class="dh-sc"><div class="dh-scn" style="color:'+color+'">'+m.ls+'</div><div class="dh-scl">lead score</div>'
    +'<div style="margin-top:6px;width:66px"><div class="sbar-t" style="height:5px"><div class="sbar-f" style="width:'+m.ls+'%;background:'+color+'"></div></div></div></div></div>'
    +'<div class="dh-cta">'+ctas+'</div></div>'

    +'<div class="dblk"><div class="dblk-t">Estado CRM · Seguimiento</div>'
    +stBtns
    +'<div style="margin-bottom:5px"><label style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px">Notas</label></div>'
    +'<textarea id="nta" class="nta" data-id="'+m.id+'" placeholder="Lo que hablaron, objeciones, próximos pasos...">'+xe(crm.notes||'')+'</textarea>'
    +'</div>'

    +'<div class="d2col">'
    +'<div><div class="dblk"><div class="dblk-t">Datos generales</div>'
    +'<div class="irow"><span class="ik">Ciudad</span><span class="iv">'+xe(m.c)+', '+xe(m.p)+'</span></div>'
    +'<div class="irow"><span class="ik">Teléfono</span><span class="iv" style="color:var(--g)">'+xe(m.tel||'—')+'</span></div>'
    +'<div class="irow"><span class="ik">Tipo</span><span class="iv">'+(m.mobile?'📱 Móvil + WhatsApp':'☎ Fijo · solo llamada')+'</span></div>'
    +'<div class="irow"><span class="ik">Rating Google</span><span class="iv">'+m.rat+' ★ ('+m.rev+' reseñas)</span></div>'
    +'<div class="irow"><span class="ik">Score marketing</span><span class="iv">'+m.score+'/10</span></div>'
    +'<div class="irow"><span class="ik">Facilidad de venta</span><span class="iv" style="color:'+c2(m.ease)+'">'+m.ease+'/100</span></div>'
    +'</div>'
    +'<div class="dblk"><div class="dblk-t">Estado Instagram</div>'+igBlock+'</div></div>'

    +'<div><div class="dblk"><div class="dblk-t">Diagnóstico</div>'
    +'<div class="prob"><div class="prob-l">⚠ Problema detectado</div>'
    +'<div style="font-size:13px;color:var(--t1);line-height:1.65">'+problem+'</div></div>'
    +'</div>'
    +'<div class="dblk"><div class="dblk-t">Oportunidad comercial</div>'
    +'<div class="irow"><span class="ik">Oportunidad redes</span><span class="iv">'+xe(m.or||'—')+'</span></div>'
    +'<div class="irow"><span class="ik">Oportunidad web</span><span class="iv">'+xe(m.ow||'—')+'</span></div>'
    +'<div class="irow"><span class="ik">GAP competitivo</span><span class="iv">'+xe(m.gap||'—')+'</span></div>'
    +'<div class="irow"><span class="ik">Prioridad comercial</span><span class="iv">'+xe(m.pri||'—')+'</span></div>'
    +'</div></div></div>'

    +'<div class="dblk"><div class="dblk-t" style="display:flex; justify-content:space-between; align-items:center;">Argumento de venta para la llamada <button id="btn-copy-pitch" class="btn btn-dark" style="font-size:11px; padding:4px 8px;">Copiar Pitch</button></div>'
    +(m.srv?'<div style="margin-bottom:12px"><span class="badge bp" style="font-size:12px;padding:5px 14px">'+xe(m.srv)+'</span></div>':'')
    +'<div class="pitch"><div class="pitch-l">Script de apertura</div><div class="pitch-t" id="pitch-text-content">'+pitch+'</div></div></div>'
    +(m.mot?'<div class="dblk"><div class="dblk-t">Motivo de oportunidad detectado</div><div style="font-size:13px;color:var(--t1);line-height:1.65">'+xe(m.mot)+'</div></div>':'');
}

init();

</script>

</body>
</html>
